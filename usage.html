<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eze’s App Usage</title>
  <link rel="stylesheet" href="usage.css" />
</head>
<body>
  <div class="page">
    <div class="header">
      <h1>Daily App Usage</h1>
      <p>Tracked quietly by Euca in the background.</p>
    </div>

    <section class="panel summary-panel">
      <div class="summary-top">
        <h2>Today’s usage</h2>
        <div class="pill" id="usageDate">Loading date...</div>
      </div>

      <div class="cards" id="usageCards">
        <div class="empty">Loading usage data...</div>
      </div>
    </section>

    <section class="panel events-panel">
      <div class="events-header">
        <h2>Recent events</h2>
        <div class="pill">Latest 20 records</div>
      </div>

      <div class="events-list" id="recentEvents">
        <div class="empty">Loading recent events...</div>
      </div>
    </section>

    <a class="nav-link" href="index.html">← Back home</a>
  </div>

  <script>
    const API_BASE = "https://euca.glinda0723.workers.dev";

    async function loadUsage() {
      const cardsEl = document.getElementById("usageCards");
      const dateEl = document.getElementById("usageDate");

      try {
        const tzOffsetMinutes = new Date().getTimezoneOffset();
        const res = await fetch(`${API_BASE}/api/today-usage?tzOffsetMinutes=${tzOffsetMinutes}`);
        const data = await res.json();

        dateEl.textContent = data.date || "Today";

        if (!data.apps || data.apps.length === 0) {
          cardsEl.innerHTML = `<div class="empty">No usage data yet today.</div>`;
          return;
        }

        cardsEl.innerHTML = data.apps.map(app => {
          const minutes = Number(app.total_minutes || 0).toFixed(2);
          const active = Number(app.active_now) === 1;

          return `
            <article class="card">
              <div class="card-title">
                <h3>${escapeHtml(app.app)}</h3>
                <span class="status ${active ? 'active' : 'inactive'}">
                  ${active ? 'Active now' : 'Inactive'}
                </span>
              </div>
              <div class="time-big">${minutes} min</div>
              <div class="meta">
                <div>Total events: ${app.total_events}</div>
                <div>Open: ${app.open_count} · Close: ${app.close_count}</div>
                <div>Last seen: ${formatDateTime(app.last_seen)}</div>
              </div>
            </article>
          `;
        }).join("");
      } catch (err) {
        cardsEl.innerHTML = `<div class="empty">Failed to load usage data.</div>`;
        console.error(err);
      }
    }

    async function loadRecentEvents() {
      const listEl = document.getElementById("recentEvents");

      try {
        const res = await fetch(`${API_BASE}/api/recent-events`);
        const data = await res.json();

        if (!data.events || data.events.length === 0) {
          listEl.innerHTML = `<div class="empty">No recent events yet.</div>`;
          return;
        }

        listEl.innerHTML = data.events.map(ev => {
          return `
            <div class="event-row">
              <div class="event-app">${escapeHtml(ev.app)}</div>
              <div class="event-type">${escapeHtml(ev.event)}</div>
              <div class="event-time">${formatDateTime(ev.created_at)}</div>
            </div>
          `;
        }).join("");
      } catch (err) {
        listEl.innerHTML = `<div class="empty">Failed to load recent events.</div>`;
        console.error(err);
      }
    }

    function formatDateTime(iso) {
      if (!iso) return "-";
      const d = new Date(iso);
      return d.toLocaleString([], {
        hour: "2-digit",
        minute: "2-digit",
        month: "short",
        day: "numeric"
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    loadUsage();
    loadRecentEvents();
  </script>
</body>
</html>
